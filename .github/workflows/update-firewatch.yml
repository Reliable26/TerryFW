name: Update Firewatch Radar

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-firewatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Update Firewatch data
        run: npm run update

      - name: Commit updated data
        run: |
          git config user.name "firewatch-radar"
          git config user.email "firewatch-radar@users.noreply.github.com"
          git add data/firewatch.json data/archived.json
          git commit -m "Update Firewatch Radar data" || echo "No changes"
          git push
